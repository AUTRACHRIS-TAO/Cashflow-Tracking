<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="nav">
        <div logo>
            <h1>Cashflow Tracker</h1>
        </div>
    </nav>

    <div class="expenses">
        <h2>EXPENSES</h2>

        <input id="expenseInput" class="expenseInput" placeholder="Amount"  type="text">
        <button id="expenseButton" class="addExpense">ADD</button>
        <h3 id="totalExpenses" class="totalExpenses"></h3>
    </div>

    <div class="savings">
        <h2>SAVINGS</h2>

        <input id="savingInput" class="savingInput" placeholder="Amount"  type="text">
        <button id="savingButton" class="addSaving">ADD</button>
        <h3 id="totalSavings" class="totalSavings"></h3>
    </div>

    <div class="investments">
        <h2>INVESTMENTS</h2>
        <input id="investmentInput" class="investmentInput" placeholder="Name"  type="text">
        <button id="investmentButton" class="addInvestment">ADD</button>
        <h3 id="totalInvestments" class="totalInvestments"></h3>

    </div>

    


    <script src="script.js"></script>
</body>
</html>
